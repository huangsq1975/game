<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>六邊形戰閃電戰</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#060c14; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; }
canvas { display:block; touch-action:none; }
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script src="units.js"></script>
<script>
'use strict';

/* ─── Load game config synchronously before Phaser init ─ */
function _loadSync(url) {
    const xhr = new XMLHttpRequest();
    xhr.open('GET', url, false);
    xhr.send(null);
    return JSON.parse(xhr.responseText);
}
const GC = _loadSync('config/game.json');

let W    = GC.canvas.width;
let H    = GC.canvas.height;
let COLS = GC.grid.cols;
let ROWS = GC.grid.rows;
let SZ   = GC.grid.hexSize;
let UI_H = GC.grid.uiHeight;
let TOP  = GC.grid.gridTop;
let GRID_OFFSET_X = GC.grid.gridOffsetX;

/* ─── Flat-top hex geometry (odd-q: odd cols shift DOWN) */
function h2p(c, r) {
    return {
        x: GRID_OFFSET_X + SZ * 1.5 * c,
        y: TOP + SZ * Math.sqrt(3) * (r + (c & 1) * 0.5)
    };
}

/* Neighbours for flat-top odd-q offset */
function nbrs(col, row) {
    const e = [[col,row-1],[col,row+1],[col+1,row-1],[col+1,row],[col-1,row-1],[col-1,row]];
    const o = [[col,row-1],[col,row+1],[col+1,row],[col+1,row+1],[col-1,row],[col-1,row+1]];
    return ((col & 1) ? o : e).filter(([c,r]) => c>=0 && c<COLS && r>=0 && r<ROWS);
}

/* BFS distance map from target hex */
function bfs(tc, tr) {
    const d = {}, q = [[tc, tr, 0]];
    d[`${tc},${tr}`] = 0;
    while (q.length) {
        const [c, r, n] = q.shift();
        for (const [nc, nr] of nbrs(c, r)) {
            const k = `${nc},${nr}`;
            if (!(k in d)) { d[k] = n + 1; q.push([nc, nr, n+1]); }
        }
    }
    return d;
}

/* All 6 theoretical neighbours (no bounds check) */
function allNbrs(col, row) {
    const e = [[col,row-1],[col,row+1],[col+1,row-1],[col+1,row],[col-1,row-1],[col-1,row]];
    const o = [[col,row-1],[col,row+1],[col+1,row],[col+1,row+1],[col-1,row],[col-1,row+1]];
    return (col & 1) ? o : e;
}

/* Return the neighbour hex in the given screen-space angle direction.
   Result may be out of bounds — caller must check. */
function stepInDir(c, r, angle) {
    const {x: cx, y: cy} = h2p(c, r);
    const far = SZ * 3;
    const tx = cx + Math.cos(angle) * far;
    const ty = cy + Math.sin(angle) * far;
    let best = null, bestD = Infinity;
    for (const [nc, nr] of allNbrs(c, r)) {
        const {x, y} = h2p(nc, nr);
        const d = Math.hypot(x - tx, y - ty);
        if (d < bestD) { bestD = d; best = [nc, nr]; }
    }
    return best;
}

/* UDEFS 兵種配置 → 見 units.js */

let uid = 0;

/* ─── Main Scene ─────────────────────────────────────── */
class GameScene extends Phaser.Scene {
    constructor() { super('Game'); }

    preload() {
        this.load.image('uiback', 'UITexture/UIBack.png');
        this.load.image('plains', 'UITexture/Plains.png');
        this.load.atlas('tilesets', 'UITexture/Tilesets.png', 'config/Tilesets.json');
        this.load.json('mapdata',  'config/map.json');
        this.load.json('unitsdata', 'config/units.json');
    }

    create() {
        /* ── 加載兵種配置，clr 從 hex 字串轉為整數 ── */
        const rawUnits = this.cache.json.get('unitsdata');
        Object.keys(rawUnits).forEach(k => {
            UDEFS[k] = Object.assign({}, rawUnits[k], { clr: parseInt(rawUnits[k].clr, 16) });
        });

        this.units    = [];
        this.hexOwner = {};
        this.gold     = GC.economy.initialGold;
        this.aiGold   = GC.economy.initialGold;
        this.goldT    = 0;
        this.aiT      = 0;
        this.over     = false;
        this.paused   = false;
        this.sel      = 'infantry';
        this.dirty    = true;
        this.timeLeft = GC.timer.matchDuration;

        /* ── Settings ── */
        this.settings = { fogEnabled: true, aiDiff: 1, showCoords: true };
        this.settingsOpen = false;
        this.pausedBeforeSettings = false;

        const md = this.cache.json.get('mapdata');
        this.EB    = md.enemyBase;
        this.PB    = md.playerBase;
        this.forts = md.forts;
        this.fixedForts = md.fixedForts;

        this.dE = bfs(this.EB.c, this.EB.r);
        this.dP = bfs(this.PB.c, this.PB.r);

        /* ── Player arrow map: fort → one row up, then apply overrides ── */
        this.arrowP = {};
        this.forts.forEach(f => { this.arrowP[`${f.c},${f.r}`] = [f.c, f.r - 1]; });
        Object.entries(md.arrowPlayerOverrides).forEach(([k, v]) => { this.arrowP[k] = v; });

        /* ── Enemy arrow map: load directly from config ── */
        this.arrowE = {};
        Object.entries(md.arrowEnemy).forEach(([k, v]) => { this.arrowE[k] = v; });
        this.aiLane  = 0;
        this.aiLaneT = 0;

        /* ── Player fortress click options ── */
        this.fortOptP = {};   // k -> [[c,r], ...]
        this.fortCurrP = {};  // k -> 0=up, 1=opt[0], 2=opt[1]
        this.forts.forEach(f => {
            const k = this.k(f.c, f.r);
            const {x:fx, y:fy} = h2p(f.c, f.r);
            const opts = this.forts
                .filter(g => g.r < f.r)
                .map(g => { const {x:gx,y:gy}=h2p(g.c,g.r); return {pos:[g.c,g.r],d:Math.hypot(gx-fx,gy-fy)}; })
                .sort((a,b) => a.d-b.d).slice(0,2).map(g=>g.pos);
            this.fortOptP[k]  = opts;
            this.fortCurrP[k] = 0;
        });

        /* Graphics layers */
        this.gHex  = this.add.graphics().setDepth(0);
        this.gUnit = this.add.graphics().setDepth(2);
        this.gHp   = this.add.graphics().setDepth(3);

        this.visible = new Set();
        this.mapData = md;

        this.buildHexSprites();
        this.drawGrid();
        this.buildStaticText();
        this.buildUI();
        this.buildSettingsPanel();

        /* Fog of war layer — added AFTER static text so same-depth fog renders on top */
        this.gFog = this.add.graphics().setDepth(1);

        /* Initial units */
        this.spawn('player', 'infantry');
        this.spawn('enemy',  'cavalry');

        this.input.on('pointerdown', p => this.onTap(p));
    }

    k(c, r) { return `${c},${r}`; }

    /* ── Grid ──────────────────────────────────────────── */
    drawGrid() {
        this.gHex.clear();
        // 屏幕外延格子（純視覺，無遊戲邏輯）
        for (let c = -1; c <= 7; c++) {
            for (let r = -1; r <= 15; r++) {
                if (c >= 0 && c < COLS && r >= 0 && r < ROWS) continue;
                const {x, y} = h2p(c, r);
                this.hexStroke(x, y, SZ-1.5, 0x5f7a8a);
            }
        }
        for (let c = 0; c < COLS; c++) {
            for (let r = 0; r < ROWS; r++) {
                const {x, y} = h2p(c, r);
                const isFort = this.forts.some(f => f.c===c && f.r===r);
                const isEB   = c===this.EB.c && r===this.EB.r;
                const isPB   = c===this.PB.c && r===this.PB.r;
                const ow     = this.hexOwner[this.k(c, r)];

                let fill = 0x3a4d5c, stroke = 0x5f7a8a;
                if      (isEB)  { fill = 0xaa1818; stroke = 0xff5555; }
                else if (isPB)  { fill = 0x1a2d88; stroke = 0x5577ff; }
                else if (isFort) {
                    fill   = ow==='player' ? 0x1e3d88 : ow==='enemy' ? 0x882222 : 0x7a6018;
                    stroke = 0xffee44;
                } else {
                    if      (ow==='player') fill = 0x2a3d70;
                    else if (ow==='enemy')  fill = 0x6a2020;
                }

                const isNormal = !isEB && !isPB && !isFort && !ow;
                if (isNormal) {
                    this.hexStroke(x, y, SZ-1.5, stroke);
                } else {
                    this.hexFill(x, y, SZ-1.5, fill, stroke);
                }

                /* Arrow overlay */
                const isBase = (c===this.EB.c&&r===this.EB.r)||(c===this.PB.c&&r===this.PB.r);

                if (isBase) {
                    // Base / relay: single white arrow from player map
                    const dp = this.arrowP[this.k(c,r)];
                    if (dp) { const {x:tx,y:ty}=h2p(dp[0],dp[1]); this.drawArrow(x,y,tx,ty,0xffffff,0); }
                } else if (isFort) {
                    const isFixed = this.fixedForts.some(([fc,fr])=>fc===c&&fr===r);
                    // Player arrow (left-offset) — only if player owns fortress
                    if (ow==='player') {
                        const dp = this.arrowP[this.k(c,r)];
                        if (dp) {
                            const {x:tx,y:ty}=h2p(dp[0],dp[1]);
                            this.drawArrow(x-5,y,tx,ty, isFixed?0x778899:0xffee55, 0);
                        }
                    }
                }
            }
        }
    }

    drawArrow(fx, fy, tx, ty, color) {
        const g   = this.gHex;
        const dx  = tx - fx, dy = ty - fy;
        const len = Math.sqrt(dx*dx + dy*dy);
        const nx  = dx/len, ny = dy/len;
        const hs  = SZ * 0.82;                  // shaft half-length
        const sx  = fx - nx*hs*0.15, sy = fy - ny*hs*0.15;
        const ex  = fx + nx*hs,      ey = fy + ny*hs;
        g.lineStyle(3, color, 0.92);
        g.beginPath(); g.moveTo(sx, sy); g.lineTo(ex, ey); g.strokePath();
        const hw = 7, hl = 9;
        const px = -ny, py = nx;
        g.fillStyle(color, 0.85);
        g.beginPath();
        g.moveTo(ex + nx*hl,       ey + ny*hl);
        g.lineTo(ex + px*hw,       ey + py*hw);
        g.lineTo(ex - px*hw,       ey - py*hw);
        g.closePath(); g.fillPath();
    }

    checkFortCapture(nc, nr, team) {
        if (!this.forts.some(f => f.c===nc && f.r===nr)) return;
        const k = this.k(nc, nr);
        if (this.hexOwner[k] === team) return;
        this.hexOwner[k] = team;
        this.dirty = true;
        this.showCapture(nc, nr, team);

    }

    buildHexSprites() {
        const hexW = SZ * 2;
        const hexH = SZ * Math.sqrt(3);
        const md   = this.mapData;
        const defTile = md && md.defaultTile;

        const cMin = md ? md.renderColMin : -1;
        const cMax = md ? md.renderColMax :  7;
        const rMin = md ? md.renderRowMin : -1;
        const rMax = md ? md.renderRowMax : 15;

        for (let c = cMin; c <= cMax; c++) {
            for (let r = rMin; r <= rMax; r++) {
                const {x, y} = h2p(c, r);
                const tileName = (md && md.tiles && md.tiles[`${c},${r}`]) || defTile;
                if (tileName) {
                    this.add.image(x, y, 'tilesets', tileName)
                        .setDisplaySize(hexW, hexH)
                        .setDepth(-1);
                } else {
                    this.add.image(x, y, 'plains')
                        .setDisplaySize(hexW, hexH)
                        .setDepth(-1);
                }
            }
        }
    }

    hexStroke(cx, cy, r, stroke) {
        const g = this.gHex;
        const pts = Array.from({length:6}, (_,i) => ({
            x: cx + r * Math.cos(Math.PI/3 * i),
            y: cy + r * Math.sin(Math.PI/3 * i)
        }));
        g.lineStyle(1.5, stroke, 0.88);
        g.beginPath(); g.moveTo(pts[0].x, pts[0].y);
        pts.slice(1).forEach(p => g.lineTo(p.x, p.y));
        g.closePath(); g.strokePath();
    }

    hexFill(cx, cy, r, fill, stroke) {
        const g = this.gHex;
        const pts = Array.from({length:6}, (_,i) => ({
            x: cx + r * Math.cos(Math.PI/3 * i),
            y: cy + r * Math.sin(Math.PI/3 * i)
        }));
        g.fillStyle(fill, 1);
        g.beginPath(); g.moveTo(pts[0].x, pts[0].y);
        pts.slice(1).forEach(p => g.lineTo(p.x, p.y));
        g.closePath(); g.fillPath();
        g.lineStyle(1.5, stroke, 0.88);
        g.beginPath(); g.moveTo(pts[0].x, pts[0].y);
        pts.slice(1).forEach(p => g.lineTo(p.x, p.y));
        g.closePath(); g.strokePath();
    }

    buildStaticText() {
        const sz7 = { fontSize:'12px', color:'#e8f4ff', stroke:'#000000', strokeThickness:3 };
        const sz13 = { fontSize:'13px', color:'#ffee44' };
        this.coordLabels = [];
        for (let c = 0; c < COLS; c++) {
            for (let r = 0; r < ROWS; r++) {
                const {x, y} = h2p(c, r);
                // Coordinate label
                const cl = this.add.text(x, y + SZ*0.44, `${c},${r}`, sz7)
                    .setOrigin(0.5, 0.5).setDepth(1);
                this.coordLabels.push(cl);
                // Fort star
                if (this.forts.some(f => f.c===c && f.r===r))
                    this.add.text(x, y - 1, '★', sz13)
                        .setOrigin(0.5, 0.5).setDepth(1);
                // Base labels
                if (c===this.EB.c && r===this.EB.r)
                    this.add.text(x, y-4, '敵', { fontSize:'15px', color:'#ffaaaa', fontStyle:'bold' })
                        .setOrigin(0.5, 0.5).setDepth(1);
                if (c===this.PB.c && r===this.PB.r)
                    this.add.text(x, y-4, '我', { fontSize:'15px', color:'#aaccff', fontStyle:'bold' })
                        .setOrigin(0.5, 0.5).setDepth(1);
            }
        }
        this.add.text(W/2, 4, '六邊形戰閃電戰', { fontSize:'13px', color:'#aabbcc', fontStyle:'bold' })
            .setOrigin(0.5, 0).setDepth(1);

        // Legend top-right
        this.add.text(W-8, 4,
            '克制: 騎>步 步>弓 弓>騎',
            { fontSize:'8px', color:'#667788' }
        ).setOrigin(1, 0).setDepth(1);

        // Countdown timer (top-left)
        this.timerTxt = this.add.text(8, 4, '05:00', {
            fontSize:'14px', color:'#eeddaa', fontStyle:'bold'
        }).setOrigin(0, 0).setDepth(9);

        // Pause button (top-center, below title)
        this.pauseBg = this.add.graphics().setDepth(8);
        this.pauseLbl = this.add.text(W/2, 22, '⏸ 暫停', {
            fontSize:'12px', color:'#aabbcc',
            backgroundColor:'#1a2a3a', padding:{ x:10, y:4 }
        }).setOrigin(0.5, 0).setInteractive().setDepth(9);
        this.pauseLbl.on('pointerdown', () => this.togglePause());

        // Settings button (top-right)
        this.settingsBtn = this.add.text(W-8, 22, '⚙', {
            fontSize:'17px', color:'#778899'
        }).setOrigin(1, 0.5).setDepth(9).setInteractive();
        this.settingsBtn.on('pointerdown', () => this.openSettings());

        // Pause overlay (hidden by default)
        this.pauseOverlay = this.add.graphics().setDepth(14).setVisible(false);
        this.pauseOverlay.fillStyle(0x000000, 0.6);
        this.pauseOverlay.fillRect(0, 0, W, H);
        this.pauseTxt = this.add.text(W/2, H/2, '⏸\n已暫停', {
            fontSize:'40px', color:'#ffffff', fontStyle:'bold', align:'center', lineSpacing:8
        }).setOrigin(0.5, 0.5).setDepth(15).setVisible(false);
        this.resumeTxt = this.add.text(W/2, H/2+100, '  繼續遊戲  ', {
            fontSize:'22px', color:'#ffffff',
            backgroundColor:'#1a3a5a', padding:{ x:22, y:11 }
        }).setOrigin(0.5, 0.5).setInteractive().setDepth(15).setVisible(false);
        this.resumeTxt.on('pointerdown', () => this.togglePause());
    }

    /* ── UI Panel ──────────────────────────────────────── */
    buildUI() {
        const py = H - UI_H;
        this.add.image(W/2, py + UI_H/2, 'uiback')
            .setDisplaySize(W, UI_H).setDepth(4);

        this.goldTxt = this.add.text(12, py+7, `💰 ${GC.economy.initialGold}`, {
            fontSize:'15px', color:'#ffdd44', fontStyle:'bold'
        }).setDepth(5);

        this.aiGoldTxt = this.add.text(W-12, py+7, `AI💰 ${GC.economy.initialGold}`, {
            fontSize:'11px', color:'#ff8888'
        }).setOrigin(1, 0).setDepth(5);

        const types = ['cavalry', 'archer', 'infantry'];
        const bw = GC.render.unitBtnWidth, bh = GC.render.unitBtnHeight,
              by = py + GC.render.unitBtnOffsetY, gap = GC.render.unitBtnGap;
        const bx0 = (W - (bw*3 + gap*2)) / 2;

        this.btns = types.map((type, i) => {
            const def = UDEFS[type];
            const bx  = bx0 + i*(bw+gap);
            const g2  = this.add.graphics().setDepth(4);
            const clr = '#' + def.clr.toString(16).padStart(6,'0');

            this.add.text(bx+bw/2, by+14, def.ch, { fontSize:'17px', color:clr, fontStyle:'bold' })
                .setOrigin(0.5, 0.5).setDepth(5);
            this.add.text(bx+bw/2, by+31, def.name, { fontSize:'11px', color:'#ccd8e8' })
                .setOrigin(0.5, 0.5).setDepth(5);
            this.add.text(bx+bw/2, by+46, `💰${def.cost}  HP:${def.hp}`, { fontSize:'9px', color:'#7a8a9a' })
                .setOrigin(0.5, 0.5).setDepth(5);
            this.add.text(bx+bw/2, by+61, `克制: ${UDEFS[def.beats].name}`, { fontSize:'8px', color:'#55aa55' })
                .setOrigin(0.5, 0.5).setDepth(5);

            const zone = this.add.zone(bx, by, bw, bh)
                .setOrigin(0, 0).setInteractive().setDepth(6);
            zone.on('pointerdown', () => { this.sel = type; this.refreshBtns(); });

            return { type, g:g2, bx, by, bw, bh };
        });
        this.refreshBtns();

        this.add.text(W/2, py+115,
            '點擊右下角己方基地 部署選中兵種',
            { fontSize:'10px', color:'#445566' }
        ).setOrigin(0.5, 0).setDepth(5);

        this.add.text(W/2, py+130,
            '點擊★可切換箭頭方向（最近2個堡壘）',
            { fontSize:'9px', color:'#556633' }
        ).setOrigin(0.5, 0).setDepth(5);
    }

    refreshBtns() {
        this.btns.forEach(b => {
            b.g.clear();
            const sel = b.type === this.sel;
            b.g.fillStyle(sel ? 0x162944 : 0x090f1e, 1);
            b.g.lineStyle(sel ? 2 : 1, sel ? 0xffffff : 0x1e2e3e, 1);
            b.g.fillRoundedRect(b.bx, b.by, b.bw, b.bh, 7);
            b.g.strokeRoundedRect(b.bx, b.by, b.bw, b.bh, 7);
        });
    }

    /* ── Input ─────────────────────────────────────────── */
    onTap(p) {
        if (this.over || this.settingsOpen || p.y >= H - UI_H) return;
        // Find nearest hex
        let best = null, bd = Infinity;
        for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) {
            const {x,y} = h2p(c, r);
            const d = Math.hypot(p.x-x, p.y-y);
            if (d < bd) { bd = d; best = {c,r}; }
        }
        if (!best || bd > SZ + GC.render.hexClickTolerance) return;
        if (best.c === this.PB.c && best.r === this.PB.r) {
            const cost = UDEFS[this.sel].cost;
            if (this.gold >= cost) {
                this.gold -= cost;
                this.spawn('player', this.sel);
            } else {
                this.flashNoGold();
            }
        } else if (this.forts.some(f => f.c===best.c && f.r===best.r)) {
            this.onFortClick(best.c, best.r);
        }
    }

    onFortClick(c, r) {
        if (this.fixedForts.some(([fc,fr]) => fc===c && fr===r)) return;
        const k = this.k(c, r);
        const opts = this.fortOptP[k] || [];
        if (!opts.length) return;
        const total = opts.length + 1;
        this.fortCurrP[k] = (this.fortCurrP[k] + 1) % total;
        this.arrowP[k] = this.fortCurrP[k] === 0
            ? [c, r - 1]
            : opts[this.fortCurrP[k] - 1];
        this.dirty = true;
    }

    flashNoGold() {
        const t = this.add.text(W/2, H - UI_H - 20, '金幣不足!', {
            fontSize:'16px', color:'#ff4444', fontStyle:'bold'
        }).setOrigin(0.5, 1).setDepth(10);
        this.time.delayedCall(800, () => t.destroy());
    }

    /* ── Spawn ─────────────────────────────────────────── */
    spawn(team, type) {
        const base = team==='player' ? this.PB : this.EB;
        const def  = UDEFS[type];
        const {x,y} = h2p(base.c, base.r);
        const u = {
            id:uid++, team, type,
            hp:def.hp, maxHp:def.hp, atk:def.atk, spd:def.spd,
            c:base.c, r:base.r, x, y,
            mvT:0, atkT:0, bleedTick:0, dead:false, dir:null, visitedForts:new Set(),
            attackedBy: null,
            gfx: this.add.graphics().setDepth(2),
            hpg: this.add.graphics().setDepth(3),
            lbl: this.add.text(x, y, def.ch, {
                fontSize:'11px', color:'#ffffff', fontStyle:'bold'
            }).setOrigin(0.5, 0.5).setDepth(3),
        };
        this.units.push(u);
    }

    /* ── Pause ─────────────────────────────────────────── */
    togglePause() {
        if (this.over || this.settingsOpen) return;
        this.paused = !this.paused;
        const isPaused = this.paused;
        this.pauseOverlay.setVisible(isPaused);
        this.pauseTxt.setVisible(isPaused);

    openSettings() {
        if (this.over) return;
        this.settingsOpen = true;

        this.settingsGroup.forEach(o => o.setVisible(false));
    }

    update(time, delta) {
        this.tick(Math.min(delta, GC.combat.maxDeltaMs));
    }

    /* ── Main tick ─────────────────────────────────────── */
    tick(dt) {
        if (this.over || this.paused) return;

        const eco = GC.economy;
        const ai  = GC.ai;

        /* Gold regen */
        this.goldT += dt;
        if (this.goldT >= eco.regenInterval) {
            this.goldT = 0;
            const aiMult = ai.goldMultipliers[this.settings.aiDiff];
            this.gold   = Math.min(this.gold   + eco.regenPerSec,           eco.maxGold);
            this.aiGold = Math.min(this.aiGold + eco.regenPerSec * aiMult,  eco.maxGold);
            /* Fortress bonus */
            const pf = this.forts.filter(f => this.hexOwner[this.k(f.c,f.r)]==='player').length;
            const ef = this.forts.filter(f => this.hexOwner[this.k(f.c,f.r)]==='enemy').length;
            this.gold   = Math.min(this.gold   + pf * eco.fortBonusPerSec,            eco.maxGold);
            this.aiGold = Math.min(this.aiGold + ef * eco.fortBonusPerSec * aiMult,   eco.maxGold);
        }

        /* AI lane rotation */
        this.aiLaneT += dt;
        if (this.aiLaneT >= ai.laneRotateInterval) {
            this.aiLaneT = 0;
            this.aiLane = (this.aiLane + 1) % this.mapData.aiLaneTargets.length;
            const junctionKey = `${this.mapData.enemyBase.c+1},${this.mapData.enemyBase.r+1}`;
            this.arrowE['3,1'] = this.mapData.aiLaneTargets[this.aiLane];
        }

        /* Player auto-spawn */
        this.playerSpawnT = (this.playerSpawnT || 0) + dt;
        if (this.playerSpawnT >= GC.player.autoSpawnInterval) {
            this.playerSpawnT = 0;
            const cost = UDEFS[this.sel].cost;
            if (this.gold >= cost) {
                this.gold -= cost;
                this.spawn('player', this.sel);
            }
        }

        /* AI spawn */
        this.aiT += dt;
        const aiInterval = ai.spawnIntervals[this.settings.aiDiff];
        if (this.aiT >= aiInterval) { this.aiT = 0; this.aiSpawn(); }

        /* Update all units */
        this.units.forEach(u => { if (!u.dead) this.updateUnit(u, dt); });


        /* Rear-fortress bleed */
        this.units.forEach(u => { if (!u.dead) this.applyBleed(u, dt); });

        /* Remove dead */
        this.units = this.units.filter(u => {
            if (u.dead) { u.gfx.destroy(); u.hpg.destroy(); u.lbl.destroy(); return false; }
            return true;
        });

        /* Win / lose */
        const eWin = this.units.some(u => !u.dead && u.team==='enemy'  && u.c===this.PB.c && u.r===this.PB.r);
        const pWin = this.units.some(u => !u.dead && u.team==='player' && u.c===this.EB.c && u.r===this.EB.r);
        if (eWin) { this.endGame(false); return; }
        if (pWin) { this.endGame(true);  return; }

        /* Redraw grid if ownership changed */
        if (this.dirty) { this.drawGrid(); this.dirty = false; }

        /* Countdown timer */
        this.timeLeft -= dt / 1000;
        if (this.timeLeft <= 0) {
            this.timeLeft = 0;
            /* 時間到：比較己方與敵方占領的要塞數決定勝負 */
            const pf = this.forts.filter(f => this.hexOwner[this.k(f.c,f.r)]==='player').length;
            const ef = this.forts.filter(f => this.hexOwner[this.k(f.c,f.r)]==='enemy').length;
            this.endGame(pf >= ef);
            return;
        }
        const sec  = Math.ceil(this.timeLeft);
        const mm   = String(Math.floor(sec / 60)).padStart(2, '0');
        const ss   = String(sec % 60).padStart(2, '0');
        const warn = this.timeLeft <= GC.timer.warnSeconds;
        this.timerTxt.setText(`${mm}:${ss}`);
        this.timerTxt.setColor(warn ? '#ff4444' : '#eeddaa');

        this.updateFog();
        this.renderUnits();
        this.goldTxt.setText(`💰 ${Math.floor(this.gold)}`);
        this.aiGoldTxt.setText(`AI💰 ${Math.floor(this.aiGold)}`);
    }

    /* ── Unit logic ────────────────────────────────────── */
    updateUnit(u, dt) {
        const dm = u.team==='player' ? this.dE : this.dP;
        const ns = nbrs(u.c, u.r);

        /* Determine next move destination */
        const arr = (u.team==='player' ? this.arrowP : this.arrowE)[this.k(u.c, u.r)];
        let nextC = null, nextR = null;
        if (arr) {
            nextC = arr[0]; nextR = arr[1];
        } else if (u.dir !== null) {
            const [nc, nr] = stepInDir(u.c, u.r, u.dir);
            if (nc >= 0 && nc < COLS && nr >= 0 && nr < ROWS) {
                nextC = nc; nextR = nr;
            }
        }

        /* Retaliation: check if our attacker is still nearby */
        let retaliateId = null;
        if (u.attackedBy !== null) {
            const attacker = this.units.find(v => !v.dead && v.id === u.attackedBy);
            if (attacker) {
                const nearby = (attacker.c === u.c && attacker.r === u.r) ||
                    ns.some(([c,r]) => attacker.c === c && attacker.r === r);
                if (nearby) retaliateId = u.attackedBy;
            }
            if (retaliateId === null) u.attackedBy = null;
        }

        /* Enemies to fight: same hex, movement direction, or retaliation */
        const foes = this.units.filter(v => {
            if (v.dead || v.team === u.team) return false;
            if (v.c === u.c && v.r === u.r) return true;
            if (nextC !== null && v.c === nextC && v.r === nextR) return true;
            if (retaliateId !== null && v.id === retaliateId) return true;
            return false;
        });

        if (foes.length > 0) {
            /* Fight */
            u.atkT += dt;
            if (u.atkT >= GC.combat.attackInterval) {
                u.atkT = 0;
                const tgt = foes.reduce((a,b) => a.hp<=b.hp ? a : b);
                const def = UDEFS[u.type];
                let dmg = u.atk;
                if      (def.beats === tgt.type) dmg = Math.round(dmg * GC.combat.beatMultiplier);
                else if (def.loses === tgt.type) dmg = Math.round(dmg * GC.combat.loseMultiplier);
                dmg += Phaser.Math.Between(GC.combat.damageVarianceMin, GC.combat.damageVarianceMax);
                tgt.hp -= dmg;
                tgt.attackedBy = u.id;   // 被攻擊 → 記錄攻擊者以便反擊
                if (tgt.hp <= 0) tgt.dead = true;
                this.showDmg(tgt.x, tgt.y, dmg, tgt.team);
            }
        } else {
            /* Move straight ahead */
            u.mvT += dt;
            if (u.mvT >= u.spd) {
                u.mvT = 0;

                if (arr) {
                    const {x: fx, y: fy} = h2p(u.c, u.r);
                    const {x: tx, y: ty} = h2p(arr[0], arr[1]);
                    u.dir = Math.atan2(ty - fy, tx - fx);
                    u.c = arr[0]; u.r = arr[1];
                    this.checkFortCapture(u.c, u.r, u.team);
                    if (this.forts.some(f=>f.c===u.c&&f.r===u.r)) u.visitedForts.add(this.k(u.c,u.r));
                    return;
                }

                if (u.dir === null) return;
                const [nc, nr] = stepInDir(u.c, u.r, u.dir);
                if (nc < 0 || nc >= COLS || nr < 0 || nr >= ROWS) {
                    u.dead = true;
                    return;
                }
                u.c = nc; u.r = nr;
                this.checkFortCapture(u.c, u.r, u.team);
                if (this.forts.some(f=>f.c===u.c&&f.r===u.r)) u.visitedForts.add(this.k(u.c,u.r));
            }
        }

        /* Smooth visual position — group by team+type so same group overlaps,
           different groups offset from each other */
        const {x,y} = h2p(u.c, u.r);
        const hexUnits  = this.units.filter(v => !v.dead && v.c===u.c && v.r===u.r);
        const groupKeys = [...new Set(hexUnits.map(v => `${v.team},${v.type}`))].sort();
        const myKey = `${u.team},${u.type}`;
        const gIdx  = groupKeys.indexOf(myKey);
        const gTot  = groupKeys.length;
        const ang   = gTot > 1 ? (gIdx / gTot) * Math.PI * 2 : 0;
        const offR  = gTot > 1 ? Math.min(GC.render.unitGroupMaxOffset, SZ * GC.render.unitGroupOffsetFactor) : 0;
        const lerpT = 1 - Math.pow(GC.render.unitLerpBase, dt / GC.render.unitLerpFrameMs);
        u.x += (x + Math.cos(ang)*offR - u.x) * lerpT;
        u.y += (y + Math.sin(ang)*offR - u.y) * lerpT;
    }

    /* ── Render units ──────────────────────────────────── */
    renderUnits() {
        this.gUnit.clear();
        this.gHp.clear();

        // Hide all labels first; we only show the representative's
        this.units.forEach(u => { if (!u.dead) u.lbl.setVisible(false); });

        // Build groups: team + type + hex
        const groups = new Map();
        this.units.forEach(u => {
            if (u.dead) return;
            const k = `${u.team},${u.type},${u.c},${u.r}`;
            if (!groups.has(k)) groups.set(k, []);
            groups.get(k).push(u);
        });

        const { hpBarHeight: BAR_H, hpBarGap: BAR_GAP, hpBarOffsetY: BAR_OFF,
                groupStackMax, unitGroupOffsetFactor, unitGroupMaxOffset } = GC.render;

        groups.forEach(grp => {
            const rep = grp[0];
            // Hide enemy units inside fog
            if (rep.team === 'enemy' && !this.visible.has(`${rep.c},${rep.r}`)) {
                grp.forEach(u => u.lbl.setVisible(false));
                return;
            }
            const r   = UDEFS[rep.type].r;
            const fc  = rep.team==='player' ? 0x1a3a88 : 0x881818;
            const rim = rep.team==='player' ? 0x5588ff : 0xff5555;
            const vx  = rep.x, vy = rep.y;

            // Circle
            this.gUnit.fillStyle(fc, 1);
            this.gUnit.fillCircle(vx, vy, r);
            this.gUnit.lineStyle(2, rim, 1);
            this.gUnit.strokeCircle(vx, vy, r);
            this.gUnit.lineStyle(1.5, UDEFS[rep.type].clr, 0.7);
            this.gUnit.strokeCircle(vx, vy, r - 2.5);

            const count = grp.length;

            if (count <= groupStackMax) {
                // Stacked HP bars going upward, one per unit
                grp.forEach((u, i) => {
                    const ratio = Math.max(0, u.hp / u.maxHp);
                    const barY  = vy - r - BAR_OFF - i * (BAR_H + BAR_GAP);
                    this.gHp.fillStyle(0x111111, 0.85);
                    this.gHp.fillRect(vx - r, barY, r * 2, BAR_H);
                    const hc = ratio > 0.6 ? 0x44ee44 : ratio > 0.3 ? 0xffee22 : 0xee2222;
                    this.gHp.fillStyle(hc, 1);
                    this.gHp.fillRect(vx - r, barY, r * 2 * ratio, BAR_H);
                });
                rep.lbl.setText(UDEFS[rep.type].ch).setFontSize('11px')
                    .setPosition(vx, vy).setVisible(true);
            } else {
                // > groupStackMax units: show average HP bar + count on label
                const avgRatio = grp.reduce((s, u) => s + u.hp / u.maxHp, 0) / count;
                const barY = vy - r - BAR_OFF;
                this.gHp.fillStyle(0x111111, 0.85);
                this.gHp.fillRect(vx - r, barY, r * 2, BAR_H);
                const hc = avgRatio > 0.6 ? 0x44ee44 : avgRatio > 0.3 ? 0xffee22 : 0xee2222;
                this.gHp.fillStyle(hc, 1);
                this.gHp.fillRect(vx - r, barY, r * 2 * avgRatio, BAR_H);
                rep.lbl.setText(`×${count}`).setFontSize('9px')
                    .setPosition(vx, vy).setVisible(true);
            }
        });
    }

    /* ── Rear-fortress bleed ─────────────────────────────── */
    /* Only forts this unit personally visited that are now foe-owned count */
    applyBleed(u, dt) {
        const foeTeam = u.team === 'player' ? 'enemy' : 'player';
        let bleedCount = 0;
        u.visitedForts.forEach(k => {
            if (this.hexOwner[k] !== foeTeam) return;
            const [fc, fr] = k.split(',').map(Number);
            // Rear: higher row for player, lower row for enemy
            if (u.team === 'player' ? fr > u.r : fr < u.r) bleedCount++;
        });
        if (!bleedCount) { u.bleedTick = 0; return; }
        u.bleedTick += dt;
        if (u.bleedTick >= GC.combat.bleedInterval) {
            u.bleedTick = 0;
            const dmg = bleedCount * GC.combat.bleedDamagePerFort;
            u.hp -= dmg;
            this.showDmg(u.x, u.y, dmg, u.team);
            if (u.hp <= 0) u.dead = true;
        }
    }

    /* ── Fog of War ────────────────────────────────────── */
    computeVisible() {
        const vis = new Set();
        const see = (c, r) => {
            vis.add(`${c},${r}`);
            for (const [nc, nr] of nbrs(c, r)) vis.add(`${nc},${nr}`);
        };
        // Player base always visible
        see(this.PB.c, this.PB.r);
        // Player-owned forts
        this.forts.forEach(f => {
            if (this.hexOwner[this.k(f.c, f.r)] === 'player') see(f.c, f.r);
        });
        // Each player unit reveals surrounding hexes
        this.units.forEach(u => {
            if (!u.dead && u.team === 'player') see(u.c, u.r);
        });
        return vis;
    }

    updateFog() {
        this.gFog.clear();
        if (!this.settings.fogEnabled) {
            this.visible = new Set();
            for (let c = 0; c < COLS; c++)
                for (let r = 0; r < ROWS; r++)
                    this.visible.add(`${c},${r}`);
            return;
        }
        this.visible = this.computeVisible();
        for (let c = 0; c < COLS; c++) {
            for (let r = 0; r < ROWS; r++) {
                if (this.visible.has(`${c},${r}`)) continue;
                const {x, y} = h2p(c, r);
                const pts = Array.from({length:6}, (_,i) => ({
                    x: x + (SZ - GC.render.fogInset) * Math.cos(Math.PI / 3 * i),
                    y: y + (SZ - GC.render.fogInset) * Math.sin(Math.PI / 3 * i)
                }));
                this.gFog.fillStyle(0x020509, 0.90);
                this.gFog.beginPath();
                this.gFog.moveTo(pts[0].x, pts[0].y);
                pts.slice(1).forEach(p => this.gFog.lineTo(p.x, p.y));
                this.gFog.closePath();
                this.gFog.fillPath();
            }
        }
    }

    /* ── AI ────────────────────────────────────────────── */
    aiSpawn() {
        let pick = 'infantry';

        const EASY_DIFF = 0;
        if (this.settings.aiDiff === EASY_DIFF) {
            /* Easy: always spawn infantry */
            pick = 'infantry';
        } else {
            /* Normal / Hard: counter-pick */
            const pc = { cavalry:0, archer:0, infantry:0 };
            this.units.filter(u => !u.dead && u.team==='player').forEach(u => pc[u.type]++);
            if      (pc.cavalry  >= pc.archer && pc.cavalry  >= pc.infantry) pick = 'archer';
            else if (pc.infantry >= pc.archer)                                pick = 'cavalry';
            else                                                               pick = 'infantry';
        }

        const cost = UDEFS[pick].cost;
        if (this.aiGold >= cost) {
            this.aiGold -= cost;
            this.spawn('enemy', pick);
        }
    }

    /* ── End game ──────────────────────────────────────── */
    endGame(won) {
        if (this.over) return;
        this.over = true;

        const ov = this.add.graphics().setDepth(12);
        ov.fillStyle(0x000000, 0.75);
        ov.fillRect(0, 0, W, H);

        this.add.text(W/2, H/2-90,
            won ? '🎉 勝利！' : '💀 失敗！',
            { fontSize:'52px', color: won ? '#88ff44' : '#ff4444', fontStyle:'bold' }
        ).setOrigin(0.5, 0.5).setDepth(13);

        this.add.text(W/2, H/2-20,
            won ? '你占領了敵方基地！' : '敵人占領了你的基地！',
            { fontSize:'20px', color:'#ffffff' }
        ).setOrigin(0.5, 0.5).setDepth(13);

        /* Stats */
        const pAlive = this.units.filter(u => !u.dead && u.team==='player').length;
        const eAlive = this.units.filter(u => !u.dead && u.team==='enemy').length;
        this.add.text(W/2, H/2+30,
            `存活兵力  我方:${pAlive}  敵方:${eAlive}`,
            { fontSize:'14px', color:'#aabbcc' }
        ).setOrigin(0.5, 0.5).setDepth(13);

        const btn = this.add.text(W/2, H/2+100, '  再來一局  ', {
            fontSize:'24px', color:'#ffffff',
            backgroundColor:'#1a3a5a', padding:{x:24, y:12}
        }).setOrigin(0.5, 0.5).setInteractive().setDepth(13);
        btn.on('pointerdown', () => this.scene.restart());
    }

}

/* ─── Boot / Start Scene ─────────────────────────────── */
class StartScene extends Phaser.Scene {
    constructor() { super('Start'); }
    create() {
        this.cameras.main.setBackgroundColor('#060c14');

        this.add.text(W/2, 160, '六邊形戰閃電戰', {
            fontSize:'28px', color:'#aaddff', fontStyle:'bold'
        }).setOrigin(0.5, 0.5);

        this.add.text(W/2, 220,
            '在六邊形網格上進行即時戰略對戰\n占領中央要塞，消滅敵方基地！',
            { fontSize:'14px', color:'#778899', align:'center', lineSpacing:6 }
        ).setOrigin(0.5, 0.5);

        const rules = [
            '⚔  騎兵  克制步兵   被弓箭手剋制',
            '🗡  步兵  克制弓箭手 被騎兵剋制',
            '🏹  弓箭手克制騎兵   被步兵剋制',
            '',
            '★  占領要塞 = 每秒額外金幣',
            '●  兵種前進中不能後退',
            '●  點擊右下角基地部署兵種',
        ];

        rules.forEach((r, i) => {
            this.add.text(W/2, 320 + i*34, r, {
                fontSize:'13px', color: i<3 ? '#99ddaa' : '#556677', align:'center'
            }).setOrigin(0.5, 0.5);
        });

        const btn = this.add.text(W/2, 590, '  開始遊戲  ', {
            fontSize:'26px', color:'#ffffff',
            backgroundColor:'#1a4a2a', padding:{x:28, y:14}
        }).setOrigin(0.5, 0.5).setInteractive();
        btn.on('pointerdown', () => this.scene.start('Game'));

        /* Pulse animation */
        this.tweens.add({
            targets: btn, scaleX:1.05, scaleY:1.05,
            duration:800, yoyo:true, repeat:-1, ease:'Sine.easeInOut'
        });

        this.add.text(W/2, H-30,
            '瀏覽器直接測試 | Phaser 3',
            { fontSize:'10px', color:'#334455' }
        ).setOrigin(0.5, 0.5);
    }
}

/* ─── Phaser init ────────────────────────────────────── */
new Phaser.Game({
    type: Phaser.AUTO,
    width: GC.canvas.width, height: GC.canvas.height,
    backgroundColor: '#060c14',
    scene: [StartScene, GameScene],
    scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH,
    },
});
</script>
</body>
